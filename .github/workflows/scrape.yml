name: Scrape WIT Results

on:
  workflow_dispatch:
    inputs:
      start_roll:
        description: 'Starting roll number'
        default: '1'
        required: false

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Scrape — one job per year in parallel
  # ──────────────────────────────────────────────
  scrape:
    strategy:
      matrix:
        year: [22, 23, 24, 25]
      fail-fast: false  # don't cancel other years if one fails
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        working-directory: actions
        run: go mod tidy

      - name: Run scraper for year 20${{ matrix.year }}
        working-directory: actions
        run: go run scraper.go ${{ github.event.inputs.start_roll }}
        env:
          YEAR_FILTER: ${{ matrix.year }}

      - name: Copy results to workspace root
        if: always()
        run: |
          cp actions/results_*.json . 2>/dev/null || true
          cp actions/failed_*.json . 2>/dev/null || true
          ls -la *.json 2>/dev/null || echo "No JSON files found"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.year }}
          path: |
            results_*.json
            failed_*.json
          retention-days: 30
          if-no-files-found: warn

  # ──────────────────────────────────────────────
  # Stage 2: Merge all per-year results
  # ──────────────────────────────────────────────
  merge:
    needs: scrape
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download all result artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: results-*
          merge-multiple: true

      - name: List downloaded files
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f -name "*.json" | sort || echo "No files found"

      - name: Merge results
        working-directory: actions/merge
        run: go run merge.go ../../artifacts ../../all_semesters_merged.json

      - name: Upload merged results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-semesters-merged
          path: |
            all_semesters_merged.json
            all_semesters_merged_failed.json
          retention-days: 90
          if-no-files-found: warn

  # ──────────────────────────────────────────────
  # Stage 3: Email notification
  # ──────────────────────────────────────────────
  notify:
    needs: merge
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download all result artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: results-*
          merge-multiple: true
        continue-on-error: true

      - name: Download merged artifact
        uses: actions/download-artifact@v4
        with:
          name: all-semesters-merged
          path: artifacts
        continue-on-error: true

      - name: Send email report
        working-directory: actions/notify
        run: go run notify.go ../../artifacts
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
